<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- 16x16 one-bit pixel glyphs. Use: <svg class="pi-ic"><use href="/shared/icons.svg#i-play"/></svg> -->
  <symbol id="i-play" viewBox="0 0 16 16" shape-rendering="crispEdges">
    <rect x="4" y="3" width="2" height="10"/><rect x="6" y="4" width="2" height="8"/>
    <rect x="8" y="5" width="2" height="6"/><rect x="10" y="6" width="2" height="4"/>
    <rect x="12" y="7" width="2" height="2"/>
  </symbol>
  <symbol id="i-pause" viewBox="0 0 16 16" shape-rendering="crispEdges">
