    <rect x="3" y="10" width="2" height="3"/><rect x="7" y="7" width="2" height="6"/>
    <rect x="11" y="4" width="2" height="9"/>
  </symbol>
  <symbol id="i-eye" viewBox="0 0 16 16" shape-rendering="crispEdges">
    <rect x="5" y="5" width="6" height="2"/><rect x="5" y="9" width="6" height="2"/>
    <rect x="3" y="7" width="2" height="2"/><rect x="11" y="7" width="2" height="2"/>
    <rect x="7" y="7" width="2" height="2"/>
  </symbol>
  <symbol id="i-lamp" viewBox="0 0 16 16" shape-rendering="crispEdges">
