    <rect x="7" y="7" width="2" height="2"/><rect x="9" y="9" width="2" height="2"/>
    <rect x="11" y="11" width="2" height="2"/><rect x="11" y="3" width="2" height="2"/>
    <rect x="9" y="5" width="2" height="2"/><rect x="5" y="9" width="2" height="2"/>
    <rect x="3" y="11" width="2" height="2"/>
  </symbol>
  <symbol id="i-hold" viewBox="0 0 16 16" shape-rendering="crispEdges">
