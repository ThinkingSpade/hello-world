  </symbol>
  <symbol id="i-restart" viewBox="0 0 16 16" shape-rendering="crispEdges">
    <rect x="4" y="3" width="5" height="2"/><rect x="4" y="5" width="2" height="6"/>
    <rect x="4" y="11" width="8" height="2"/><rect x="12" y="5" width="2" height="6"/>
    <rect x="10" y="1" width="2" height="2"/><rect x="10" y="3" width="2" height="2"/>
    <rect x="12" y="3" width="2" height="2"/>
  </symbol>
  <symbol id="i-check" viewBox="0 0 16 16" shape-rendering="crispEdges">
