    <rect x="7" y="8" width="2" height="2"/><rect x="9" y="6" width="2" height="2"/>
    <rect x="11" y="4" width="2" height="2"/>
  </symbol>
  <symbol id="i-x" viewBox="0 0 16 16" shape-rendering="crispEdges">
