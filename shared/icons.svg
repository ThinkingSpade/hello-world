    <rect x="7" y="6" width="2" height="4"/><rect x="6" y="10" width="4" height="2"/>
    <rect x="4" y="12" width="8" height="2"/>
  </symbol>
  <symbol id="i-search" viewBox="0 0 16 16" shape-rendering="crispEdges">
