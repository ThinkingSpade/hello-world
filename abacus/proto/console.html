<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Abacus · Console prototype</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⌘</text></svg>">
<script src="../vendor/sql-wasm.js"></script>
<style>
  :root {
    --bg: #0f1219; --panel: #171b24; --panel-2: #1e2330; --line: #2a3140;
    --text: #d7dee8; --dim: #7c8698; --grid: #29303e; --chip: rgba(111,156,240,.12);
    --green: #6ec18a; --coral: #e78573; --gold: #d8b46a; --viz-accent: #6f9cf0;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text); font-family: "SF Mono", ui-monospace, "Courier New", monospace; font-size: 14px; line-height: 1.5; }
  .top { display: flex; align-items: center; gap: .8rem; padding: .7rem 1rem; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--bg); z-index: 20; }
  .top .brand { font-weight: 700; letter-spacing: .04em; } .top .brand b { color: var(--viz-accent); }
  .top .spacer { flex: 1; }
  .top a { color: var(--dim); text-decoration: none; font-size: .82rem; } .top a:hover { color: var(--text); }
  .wrap { max-width: 980px; margin: 0 auto; padding: 1rem; }
  .cmdbar { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: .7rem .8rem; display: flex; align-items: center; gap: .45rem; flex-wrap: wrap; position: sticky; top: 55px; z-index: 15; }
  .prompt { color: var(--green); font-weight: 700; }
  .tok { background: var(--panel-2); border: 1px solid var(--line); color: var(--text); font: inherit; padding: .18rem .55rem; border-radius: 7px; cursor: pointer; white-space: nowrap; }
  .tok:hover { border-color: var(--viz-accent); }
  .tok .k { color: var(--dim); } .tok .v { color: var(--viz-accent); font-weight: 700; }
  .tok.ph .v { color: var(--dim); font-weight: 400; font-style: italic; }
  .tok.rm { color: var(--coral); border-color: transparent; background: transparent; padding: .1rem .3rem; }
  .cmd-chip { background: transparent; border: 1px dashed var(--line); color: var(--dim); font: inherit; padding: .18rem .5rem; border-radius: 7px; cursor: pointer; }
  .cmd-chip:hover { color: var(--gold); border-color: var(--gold); }
  .run { margin-left: auto; background: var(--viz-accent); color: #0f1219; border: 0; font: inherit; font-weight: 700; padding: .3rem .9rem; border-radius: 7px; cursor: pointer; }
  .run:disabled { opacity: .4; cursor: not-allowed; }
  .toggle { background: var(--panel-2); border: 1px solid var(--line); color: var(--dim); font: inherit; padding: .18rem .5rem; border-radius: 7px; cursor: pointer; font-size: .82rem; }
  .toggle.on { color: #0f1219; background: var(--green); border-color: var(--green); font-weight: 700; }
  .menu { position: absolute; z-index: 40; background: var(--panel); border: 1px solid var(--line); border-radius: 9px; padding: .3rem; box-shadow: 0 12px 30px rgba(0,0,0,.5); max-height: 320px; overflow: auto; min-width: 190px; }
  .menu button { display: block; width: 100%; text-align: left; background: transparent; border: 0; color: var(--text); font: inherit; padding: .3rem .5rem; border-radius: 6px; cursor: pointer; }
  .menu button:hover { background: var(--panel-2); color: var(--viz-accent); }
  .menu .grp { font-size: .66rem; color: var(--dim); text-transform: uppercase; letter-spacing: .1em; padding: .3rem .5rem .1rem; }
  .hint { color: var(--dim); font-size: .78rem; margin: .5rem .2rem 1rem; }
  .hint b { color: var(--gold); }
  #stream { display: flex; flex-direction: column; gap: 1rem; }
  .cell { border: 1px solid var(--line); border-radius: 10px; background: var(--panel); overflow: hidden; animation: rise .3s ease-out; }
  @keyframes rise { from { transform: translateY(8px); opacity: 0; } to { transform: none; opacity: 1; } }
  .cell .echo { padding: .5rem .8rem; border-bottom: 1px solid var(--line); color: var(--dim); font-size: .82rem; display: flex; gap: .5rem; align-items: baseline; }
  .cell .echo .n { color: var(--viz-accent); } .cell .echo b { color: var(--text); }
  .cell .body { padding: .8rem; }
  .cell .running { padding: .8rem; color: var(--dim); }
  .cell .running .cur { display: inline-block; width: .6em; height: 1em; background: var(--green); vertical-align: -2px; animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .status { color: var(--dim); font-size: .74rem; text-align: center; padding: 1.5rem 0 2rem; }
  .status .cur { display: inline-block; width: .55em; height: 1em; background: var(--green); vertical-align: -2px; animation: blink 1s steps(2) infinite; margin-left: .2rem; }
  #load { max-width: 300px; margin: 3rem auto; text-align: center; color: var(--dim); font-size: .82rem; }
  #load .b { height: 6px; background: var(--panel-2); border-radius: 999px; overflow: hidden; margin-top: .5rem; }
  #load .b i { display: block; height: 100%; width: 0; background: var(--viz-accent); }
  a.link { color: var(--viz-accent); }
</style>
</head>
<body>
  <div class="top">
    <span class="brand">abacus <b>// console</b></span>
    <span class="spacer"></span>
    <a href="./">← all prototypes</a>
  </div>
  <div class="wrap">
    <div id="load">booting the warehouse…<div class="b"><i id="loadfill"></i></div></div>
    <div id="app" style="display:none">
      <div class="cmdbar" id="cmdbar">
        <span class="prompt">abacus ❯</span>
        <button class="tok ph" id="t-metric"><span class="k">select</span> <span class="v">metric</span></button>
        <button class="tok" id="t-by"><span class="k">by</span> <span class="v">—</span></button>
        <button class="tok" id="t-window"><span class="k">window</span> <span class="v">—</span></button>
        <button class="tok" id="t-where"><span class="k">+</span> <span class="v">where</span></button>
        <button class="toggle" id="t-cmp">vs prev</button>
        <button class="run" id="run" disabled>run ⏎</button>
      </div>
      <div class="hint">pick a <b>metric</b>, then <b>run</b> — or drop a command:
        <button class="cmd-chip" data-cmd="why">\why</button>
        <button class="cmd-chip" data-cmd="cohort">\cohort</button>
        <button class="cmd-chip" data-cmd="scan">\scan</button>
        <span style="color:var(--dim)">(no chatbox — everything is a token)</span>
      </div>
      <div id="stream"></div>
      <div class="status">warehouse: <b id="rows">—</b> rows · sqlite-wasm · deterministic compiler<span class="cur"></span></div>
    </div>
  </div>

<script src="../engine.js"></script>
<script src="viz.js"></script>
<script>
  "use strict";
  const $ = (id) => document.getElementById(id);
  Viz.injectCSS();
  const TIME = ["last quarter","this quarter","q4 2025","q3 2025","q2 2025","q1 2025","2025","2024","ytd","last 6 months","june 2026","all time"];
  const st = { metric: null, dims: [], filters: [], timeIdx: 0, cmp: null };
  let n = 0;

  function tf(phrase){ return Abacus.timeFromPhrase(phrase); }
  function compareAllowed(){ return st.dims.every(d => Abacus.manifest.dimensions[d].time); }
  function curCompare(){
    if (!st.cmp || !compareAllowed()) return null;
    return tf(TIME[st.timeIdx] + (st.cmp==="yoy" ? " vs last year":" vs previous period")).compare;
  }
  function plan(){
    return { kind:"aggregate", metric: st.metric, dims:[...st.dims],
             filters: st.filters.filter(f=>!st.dims.includes(f.dim)),
             time: tf(TIME[st.timeIdx]).time, top: st.dims.includes("product")?10:null, compare: curCompare() };
  }

  function menu(anchor, groups, onPick){
    document.querySelectorAll(".menu").forEach(m=>m.remove());
    const m = document.createElement("div"); m.className="menu";
    for (const g of groups){
      if (g.label) { const h=document.createElement("div"); h.className="grp"; h.textContent=g.label; m.appendChild(h); }
      for (const it of g.items){ const b=document.createElement("button"); b.innerHTML=it.html||it.label; b.addEventListener("click",()=>{ m.remove(); onPick(it.value); }); m.appendChild(b); }
    }
    document.body.appendChild(m);
    const r = anchor.getBoundingClientRect();
    m.style.left = Math.min(r.left, window.innerWidth-m.offsetWidth-8)+"px";
    m.style.top = (r.bottom+6+window.scrollY)+"px";
    setTimeout(()=>document.addEventListener("click", function h(e){ if(!m.contains(e.target)&&e.target!==anchor){ m.remove(); document.removeEventListener("click",h);} }), 0);
  }

  function render(){
    const man = Abacus.manifest;
    const mt = $("t-metric");
    if (st.metric){ mt.className="tok"; mt.innerHTML=`<span class="k">select</span> <span class="v">${man.metrics[st.metric].label}</span>`; }
    else { mt.className="tok ph"; mt.innerHTML=`<span class="k">select</span> <span class="v">metric</span>`; }
    const by = $("t-by");
    by.innerHTML = `<span class="k">by</span> <span class="v">${st.dims.length? st.dims.join(", "):"—"}</span>`;
    $("t-window").innerHTML = `<span class="k">window</span> <span class="v">${tf(TIME[st.timeIdx]).time.label}</span>`;
    const wh = $("t-where");
    wh.innerHTML = st.filters.length ? `<span class="k">where</span> <span class="v">${st.filters.map(f=>f.value).join(", ")}</span>` : `<span class="k">+</span> <span class="v">where</span>`;
    const cmp = $("t-cmp"); cmp.classList.toggle("on", !!st.cmp && compareAllowed()); cmp.style.opacity = compareAllowed()?1:.4;
    cmp.textContent = st.cmp==="yoy" ? "vs last yr" : "vs prev";
    $("run").disabled = !st.metric;
  }

  $("t-metric").addEventListener("click", (e)=> menu(e.currentTarget,
    [{label:"measures", items:Object.entries(Abacus.manifest.metrics).map(([k,v])=>({label:v.label,value:k}))}],
    v=>{ st.metric = st.metric===v?null:v; render(); }));
  $("t-by").addEventListener("click",(e)=> menu(e.currentTarget,
    [{label:"group by (max 2)", items:[{label:"— none —",value:"__clear"},...Object.entries(Abacus.manifest.dimensions).map(([k,v])=>({label:v.label,value:k}))]}],
    v=>{ if(v==="__clear") st.dims=[]; else { const i=st.dims.indexOf(v); if(i>=0)st.dims.splice(i,1); else if(st.dims.length<2)st.dims.push(v);} render(); }));
  $("t-window").addEventListener("click",(e)=> menu(e.currentTarget,
    [{label:"window", items:TIME.map((p,i)=>({label:tf(p).time.label,value:i}))}],
    v=>{ st.timeIdx=v; render(); }));
  $("t-where").addEventListener("click",(e)=>{
    const groups = Object.entries(Abacus.manifest.values).map(([dim,vals])=>({label:dim, items:[...vals.map(val=>({label:(st.filters.some(f=>f.dim===dim&&f.value===val)?"✓ ":"")+val,value:dim+"::"+val}))]}));
    groups.unshift({items:[{label:"— clear filters —",value:"__clear"}]});
    menu(e.currentTarget, groups, v=>{ if(v==="__clear"){st.filters=[];} else { const [dim,val]=v.split("::"); const i=st.filters.findIndex(f=>f.dim===dim&&f.value===val); if(i>=0)st.filters.splice(i,1); else st.filters.push({dim,value:val}); } render(); });
  });
  $("t-cmp").addEventListener("click",()=>{ if(!compareAllowed())return; st.cmp = st.cmp? (st.cmp==="prev"?"yoy":null) : "prev"; render(); });
  $("run").addEventListener("click", ()=> exec(plan()));
  document.querySelectorAll(".cmd-chip").forEach(c=> c.addEventListener("click",()=>{
    const time = tf(TIME[st.timeIdx]).time;
    if (c.dataset.cmd==="why"){ if(!st.metric)return; exec({kind:"investigate",metric:st.metric,dims:[],filters:st.filters,time,top:null,compare:curCompare()||prevOf(time)}); }
    if (c.dataset.cmd==="cohort") exec({kind:"retention",metric:null,dims:[],filters:[],time,top:null,compare:null});
    if (c.dataset.cmd==="scan") exec({kind:"anomalies",metric:null,dims:[],filters:[],time,top:null,compare:null});
  }));
  function prevOf(t){ const s=(iso,d)=>{const x=new Date(iso+"T00:00:00Z");x.setUTCDate(x.getUTCDate()+d);return x.toISOString().slice(0,10)}; const nn=Math.round((Date.parse(t.end)-Date.parse(t.start))/864e5)+1; return {start:s(t.start,-nn),end:s(t.start,-1),label:"previous period"}; }

  function echoFor(p){
    const man = Abacus.manifest;
    if (p.kind==="investigate") return `<b>\\why</b> ${man.metrics[p.metric].label} · ${p.time.label}`;
    if (p.kind==="retention") return `<b>\\cohort</b> retention`;
    if (p.kind==="anomalies") return `<b>\\scan</b> ${p.time.label}`;
    let s = `select <b>${p.metric}</b>`; if(p.dims.length) s+=` by <b>${p.dims.join(", ")}</b>`;
    s+=` window <b>${p.time.label}</b>`; for(const f of p.filters) s+=` where <b>${f.value}</b>`;
    if(p.compare) s+=` vs <b>${p.compare.label}</b>`; return s;
  }
  async function exec(p){
    n++;
    const cell = document.createElement("div"); cell.className="cell";
    cell.innerHTML = `<div class="echo"><span class="n">[${n}]</span> <span>${echoFor(p)}</span></div><div class="running">compiling &amp; running<span class="cur"></span></div>`;
    $("stream").appendChild(cell);
    cell.scrollIntoView({behavior:"smooth",block:"end"});
    await new Promise(r=>setTimeout(r, Viz.REDUCED?0:280));
    const body = document.createElement("div"); body.className="body";
    cell.querySelector(".running").replaceWith(body);
    const { result, story } = Abacus.runAny(p);
    Viz.renderCard(body, p, result, story, { onWhy: (pl)=>exec({kind:"investigate",metric:pl.metric,dims:[],filters:pl.filters,time:pl.time,top:null,compare:pl.compare||prevOf(pl.time)}) });
    cell.scrollIntoView({behavior:"smooth",block:"nearest"});
  }

  (async()=>{
    await Viz.boot((got,total)=>{ $("loadfill").style.width=Math.round(100*got/total)+"%"; });
    const man = Abacus.manifest;
    $("rows").textContent = man.stats.rows_total.toLocaleString();
    $("load").style.display="none"; $("app").style.display="";
    st.timeIdx = TIME.indexOf("last quarter");
    render();
    // a gentle demo so the stream isn't empty
    setTimeout(()=>{ if(!n){ st.metric="revenue"; render(); exec({kind:"investigate",metric:"revenue",dims:[],filters:[],time:tf("q4 2025").time,top:null,compare:prevOf(tf("q4 2025").time)}); } }, 900);
  })();
</script>
</body>
</html>
