[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "abacus-analyst"
version = "0.1.0"
description = "Abacus — a data analyst you can interrogate: a semantic layer, a deterministic NL query compiler, and a seeded e-commerce warehouse, with a 30-question golden eval pinning the Python and browser engines together. Stdlib only."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Huy Nguyen" }]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
abacus = "abacus.cli:main"

[tool.setuptools]
packages = ["abacus"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
