[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "churn-radar"
version = "0.1.0"
description = "Churn Radar — telco customer churn prediction on the public IBM Telco dataset, with an in-browser scoring demo."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Huy Nguyen" }]
dependencies = [
    "pandas>=2.0",
    "scikit-learn>=1.4",
    "matplotlib>=3.8",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
churn = "churn.cli:main"

[tool.setuptools]
packages = ["churn"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
